name: EvalAI CI Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: examples/quickstart-ci

      - name: Run evaluation and gate
        env:
          EVALAI_API_KEY: ${{ secrets.EVALAI_API_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: npm run ci
        working-directory: examples/quickstart-ci
