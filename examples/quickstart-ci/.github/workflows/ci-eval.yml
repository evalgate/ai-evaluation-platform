name: EvalAI CI Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required for sticky PR comment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: examples/quickstart-ci

      - name: Run evaluation and gate
        env:
          EVALAI_API_KEY: ${{ secrets.EVALAI_API_KEY }}
        run: npx -y @evalgate/sdk@3.2.2 check --format github --pr-comment-out .evalai-pr-comment.md
        working-directory: examples/quickstart-ci

      - name: Post or update PR comment (sticky)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- evalai-gate-comment -->';
            const body = fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, 'examples/quickstart-ci/.evalai-pr-comment.md'), 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker) && c.user.type === 'Bot');
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
