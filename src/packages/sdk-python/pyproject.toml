[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pauly4010-evalgate-sdk"
version = "3.0.2"
description = "EvalGate Python SDK — CI for AI behavior. Traces, evaluations, assertions, and regression gates for LLM apps."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "pauly4010" }]
keywords = [
    "ai", "evaluation", "llm", "testing", "observability",
    "tracing", "monitoring", "openai", "anthropic",
    "regression", "ci", "assertions", "workflow",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27,<1",
    "pydantic>=2.0,<3",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.20"]
langchain = ["langchain-core>=0.2"]
cli = ["typer>=0.12", "rich>=13"]
all = ["pauly4010-evalgate-sdk[openai,anthropic,langchain,cli]"]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
    "respx>=0.21",
    "ruff>=0.5",
    "mypy>=1.10",
    "typer>=0.12",
    "rich>=13",
]

[project.scripts]
evalgate = "evalgate_sdk.cli:main"

[project.urls]
Homepage = "https://evalgate.com"
Documentation = "https://github.com/evalgate/ai-evaluation-platform#readme"
Repository = "https://github.com/evalgate/ai-evaluation-platform"
Issues = "https://github.com/evalgate/ai-evaluation-platform/issues"
Changelog = "https://github.com/evalgate/ai-evaluation-platform/blob/main/src/packages/sdk-python/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/evalgate_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
