[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pauly4010-evalai-sdk"
version = "1.0.1"
description = "AI Evaluation Platform SDK — traces, evaluations, assertions, and workflow tracing for LLM apps"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "pauly4010" }]
keywords = [
    "ai", "evaluation", "llm", "testing", "observability",
    "tracing", "monitoring", "openai", "anthropic",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27,<1",
    "pydantic>=2.0,<3",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.20"]
cli = ["typer>=0.12", "rich>=13"]
all = ["pauly4010-evalai-sdk[openai,anthropic,cli]"]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
    "respx>=0.21",
    "ruff>=0.5",
    "mypy>=1.10",
]

[project.scripts]
evalai = "evalai_sdk.cli:app"

[project.urls]
Homepage = "https://v0-ai-evaluation-platform-nu.vercel.app"
Repository = "https://github.com/pauly7610/ai-evaluation-platform"
Issues = "https://github.com/pauly7610/ai-evaluation-platform/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/evalai_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.9"
strict = true
warn_return_any = true
