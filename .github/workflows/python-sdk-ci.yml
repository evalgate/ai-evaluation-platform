# Python SDK CI — lint, typecheck, test, package
name: Python SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'src/packages/sdk-python/**'
      - '.github/workflows/python-sdk-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/packages/sdk-python/**'
      - '.github/workflows/python-sdk-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: src/packages/sdk-python

jobs:
  # ── 1. Lint + typecheck ────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy typecheck
        run: mypy src/evalai_sdk/ --ignore-missing-imports
        continue-on-error: true

  # ── 2. Tests ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=junit-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: src/packages/sdk-python/junit-results.xml

      - name: Test summary
        if: always()
        run: |
          echo "## Python SDK Tests (Python ${{ matrix.python-version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f junit-results.xml ]; then
            TESTS=$(python -c "import xml.etree.ElementTree as ET; r=ET.parse('junit-results.xml').getroot(); print(r.attrib.get('tests','?'))")
            FAILURES=$(python -c "import xml.etree.ElementTree as ET; r=ET.parse('junit-results.xml').getroot(); print(r.attrib.get('failures','0'))")
            ERRORS=$(python -c "import xml.etree.ElementTree as ET; r=ET.parse('junit-results.xml').getroot(); print(r.attrib.get('errors','0'))")
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Tests | $TESTS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failures | $FAILURES |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Errors | $ERRORS |" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── 3. Package ─────────────────────────────────────────────────────
  package:
    needs: [quality, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package contents
        run: |
          pip install dist/*.whl
          python -c "
          import evalai_sdk
          print(f'Version: {evalai_sdk.__version__}')

          required = [
              'AIEvalClient',
              'EvalAIError',
              'create_test_suite',
              'expect',
              'WorkflowTracer',
              'create_context',
              'SnapshotManager',
              'RateLimiter',
              'GATE_EXIT',
          ]

          missing = [name for name in required if not hasattr(evalai_sdk, name)]
          if missing:
              print(f'ERROR: Missing exports: {missing}')
              exit(1)

          print(f'All {len(required)} core exports verified')
          print(f'Total exports: {len([x for x in dir(evalai_sdk) if not x.startswith(\"_\")])}')
          "

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: evalai-sdk-python-package
          path: src/packages/sdk-python/dist/*

      - name: Package summary
        if: always()
        run: |
          echo "## Python SDK Package" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build (sdist + wheel) | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Export verification | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          VERSION=$(python -c "from evalai_sdk._version import __version__; print(__version__)")
          echo "| Version | $VERSION |" >> "$GITHUB_STEP_SUMMARY"
          ls -lh dist/ | tail -n+2 | while read line; do
            echo "| $(echo $line | awk '{print $NF}') | $(echo $line | awk '{print $5}') |" >> "$GITHUB_STEP_SUMMARY"
          done
