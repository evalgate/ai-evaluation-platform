# Example: EvalAI CI gate with sticky PR comment
# Requires secrets: EVALAI_API_KEY
# Set evaluationId in evalgate.config.json or pass --evaluationId
# Re-run 5x on same PR ⇒ still 1 comment (sticky update via <!-- evalgate-gate-comment --> marker)
name: EvalAI Gate + PR Comment

on:
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install quickstart-ci dependencies
        run: npm install
        working-directory: examples/quickstart-ci

      - name: Run gate and write PR comment
        env:
          EVALAI_API_KEY: ${{ secrets.EVALAI_API_KEY }}
        run: npx -y @evalgate/sdk@^2 check --format github --pr-comment-out .evalai-pr-comment.md
        working-directory: examples/quickstart-ci

      - name: Post or update PR comment (sticky)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- evalgate-gate-comment -->';
            const filePath = path.join(process.env.GITHUB_WORKSPACE, 'examples/quickstart-ci/.evalai-pr-comment.md');
            if (!fs.existsSync(filePath)) return;
            const body = fs.readFileSync(filePath, 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
