# Backward compatibility — old SDK versions can be required and expose core exports
# TypeScript: verifies npm published versions still export core symbols
# Python: verifies the local Python SDK exports match the TypeScript SDK surface
name: SDK Compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk-version: ["2.0.0"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Verify SDK ${{ matrix.sdk-version }} exports
        run: |
          mkdir -p /tmp/sdk-compat && cd /tmp/sdk-compat
          npm init -y
          npm install @evalgate/sdk@${{ matrix.sdk-version }}
          node -e "
            const sdk = require('@evalgate/sdk');

            // Core exports that must exist in every version
            const required = [
              'AIEvalClient',
              'EvalGateError',
              'createTestSuite',
              'traceOpenAI',
            ];

            const missing = required.filter(k => typeof sdk[k] === 'undefined');
            if (missing.length > 0) {
              console.error('Missing exports:', missing);
              process.exit(1);
            }

            // Verify AIEvalClient is constructable (no API call needed)
            try {
              new sdk.AIEvalClient({ apiKey: 'test-key', baseUrl: 'http://localhost' });
            } catch (e) {
              console.error('AIEvalClient construction failed:', e.message);
              process.exit(1);
            }

            console.log('SDK v${{ matrix.sdk-version }} OK —', Object.keys(sdk).length, 'exports');
          "

  python-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python SDK
        run: pip install -e "src/packages/sdk-python[dev]"

      - name: Run Python SDK tests
        run: python -m pytest src/packages/sdk-python/tests -v --tb=short

      - name: Verify Python SDK exports match TypeScript surface
        run: |
          python -c "
          import evalgate_sdk

          # Core exports that must exist (matching TypeScript SDK)
          required = [
              'AIEvalClient',
              'EvalGateError',
              'RateLimitError',
              'AuthenticationError',
              'NetworkError',
              'ValidationError',
              'create_error_from_response',
              'create_test_suite',
              'TestSuite',
              'expect',
              'run_assertions',
              'WorkflowTracer',
              'create_workflow_tracer',
              'trace_workflow_step',
              'contains_keywords',
              'matches_pattern',
              'has_length',
              'has_sentiment',
              'similar_to',
              'contains_language',
              'not_contains_pii',
              'has_no_hallucinations',
              'has_no_toxicity',
              'create_context',
              'get_current_context',
              'with_context',
              'WithContext',
              'SnapshotManager',
              'snapshot',
              'compare_with_snapshot',
              'export_data',
              'import_data',
              'PaginatedIterator',
              'auto_paginate',
              'RequestCache',
              'CacheTTL',
              'RequestBatcher',
              'batch_process',
              'RateLimiter',
              'stream_evaluation',
              'batch_read',
              'GATE_EXIT',
              'GATE_CATEGORY',
              'evaluate_regression',
              'to_pass_gate',
              'Logger',
              'create_logger',
              'trace_openai',
              'trace_anthropic',
              'trace_langchain',
              'trace_crewai',
              'trace_autogen',
              'openai_chat_eval',
              'define_eval',
              'define_suite',
              'create_result',
              'evalai',
              'create_eval_runtime',
              'dispose_active_runtime',
              'LocalExecutor',
              'create_local_executor',
              'default_local_executor',
              'SDK_VERSION',
              'SPEC_VERSION',
          ]

          missing = [name for name in required if not hasattr(evalgate_sdk, name)]
          if missing:
              print(f'FAIL: Missing exports: {missing}')
              exit(1)

          # Verify client is constructable
          client = evalgate_sdk.AIEvalClient(api_key='test-key', base_url='http://localhost')
          assert client.organization_id is None

          # Verify expect() returns an Expectation
          result = evalgate_sdk.expect('hello').to_contain('hello')
          assert result.passed

          print(f'Python SDK v{evalgate_sdk.__version__} OK — {len(required)} core exports verified')
          "
