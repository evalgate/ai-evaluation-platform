# Platform CI — lint, typecheck, test, build
name: Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:unit && pnpm test:db && pnpm test:dom

      - name: Coverage
        run: pnpm test:unit:coverage && pnpm test:db:coverage && pnpm test:dom:coverage

      - name: Coverage audit
        run: pnpm run audit:coverage

      - name: OpenAPI audit
        run: pnpm run audit:openapi

      - name: Demo assets audit
        run: pnpm run audit:demo-assets

      - name: Golden eval
        run: pnpm run eval:golden

      - name: Performance audit
        run: pnpm run audit:performance

      - name: Migration safety
        run: pnpm run audit:migrations

      - name: Index audit
        run: pnpm run audit:indexes

      - name: Dependency security audit
        run: pnpm audit --audit-level=high
        continue-on-error: false

      - name: Retention audit
        run: pnpm run audit:retention

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Start server
        run: pnpm start -- --port 3000 & echo $! > server.pid

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Smoke tests (E2E)
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Kill server
        if: always()
        run: kill $(cat server.pid) || true
