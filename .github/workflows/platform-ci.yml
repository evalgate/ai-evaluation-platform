# Platform CI — lint, typecheck, test, build
name: Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Jobs ────────────────────────────────────────────────────────────
# quality  → fast gate (lint + typecheck)
# test     → coverage runs (execute tests + collect coverage) + audit
# build    → Next.js build + Playwright E2E
# audits   → all non-coverage audits (independent of test results)
#
# quality runs first; test, build, audits run in parallel after it passes.

jobs:
  # ── 1. Quality gate ───────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck

  # ── 2. Test + Coverage ────────────────────────────────────────────
  test:
    needs: quality
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      TURSO_CONNECTION_URL: 'file:memory.db'
      TURSO_AUTH_TOKEN: test-token
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Unit coverage
        run: pnpm test:unit:coverage
      - name: DB coverage
        run: pnpm test:db:coverage
      - name: DOM coverage
        run: pnpm test:dom:coverage

      - name: Coverage audit
        run: pnpm run audit:coverage

  # ── 3. Build + E2E ────────────────────────────────────────────────
  build:
    needs: quality
    runs-on: ubuntu-latest
    env:
      TURSO_CONNECTION_URL: 'file:memory.db'
      TURSO_AUTH_TOKEN: test-token
      GITHUB_CLIENT_ID: ci-placeholder
      GITHUB_CLIENT_SECRET: ci-placeholder
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
      BETTER_AUTH_SECRET: ci-placeholder-secret-at-least-32-chars!!
      BETTER_AUTH_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Start server
        run: |
          pnpm start -- --port 3000 > server.log 2>&1 &
          echo $! > server.pid
          sleep 5
          echo '--- server.log (first 50 lines) ---'
          head -50 server.log || true

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Dump server log on failure
        if: failure()
        run: cat server.log || true

      - name: Smoke tests (E2E)
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Kill server
        if: always()
        run: kill $(cat server.pid) || true

  # ── 4. Audits (non-coverage) ──────────────────────────────────────
  audits:
    needs: quality
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      TURSO_CONNECTION_URL: 'file:memory.db'
      TURSO_AUTH_TOKEN: test-token
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: OpenAPI audit
        run: pnpm run audit:openapi
      - name: Demo assets audit
        run: pnpm run audit:demo-assets
      - name: Golden eval
        run: pnpm run eval:golden
      - name: Performance audit
        run: pnpm run audit:performance
      - name: Migration safety
        run: pnpm run audit:migrations
      - name: Index audit
        run: pnpm run audit:indexes
      - name: Dependency security audit
        run: pnpm audit --audit-level=high
      - name: Retention audit
        run: pnpm run audit:retention
