# Platform CI — lint, typecheck, test, build
name: Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test --run

      - name: Coverage
        run: pnpm test:coverage --run

      - name: Coverage audit
        run: pnpm run audit:coverage

      - name: OpenAPI audit
        run: pnpm run audit:openapi

      - name: Demo assets audit
        run: pnpm run audit:demo-assets

      - name: Build
        run: pnpm build
