# Tag-based release — creates GitHub Release with changelog snippet
# Tag format: sdk/v1.2.3 or v1.2.3
# Optional: add NPM_TOKEN secret to publish @evalgate/sdk to npm
# Optional: add PYPI_API_TOKEN secret to publish pauly4010-evalgate-sdk to PyPI
name: Release

on:
  push:
    tags:
      - "sdk/v*"
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (reproducible release)
        run: pnpm test --run

      - name: OpenAPI audit (reproducible release)
        run: pnpm run audit:openapi

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#sdk/v}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Validate release consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Validating release v$VERSION..."

          # 1. SDK package.json version must match tag
          PKG_VERSION=$(node -e "console.log(require('./src/packages/sdk/package.json').version)")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match SDK package.json ($PKG_VERSION)"
            echo "Update src/packages/sdk/package.json and src/packages/sdk/src/version.ts to $VERSION before tagging."
            exit 1
          fi
          echo "✓ package.json matches tag: $PKG_VERSION"

          # 2. version.ts must match tag
          SRC_VERSION=$(node -e "const fs=require('fs'); const m=fs.readFileSync('src/packages/sdk/src/version.ts','utf8').match(/SDK_VERSION\s*=\s*\"([^\"]+)\"/); console.log(m[1])")
          if [ "$SRC_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match version.ts ($SRC_VERSION)"
            exit 1
          fi
          echo "✓ version.ts matches tag: $SRC_VERSION"

          # 3. SDK CHANGELOG.md must have an entry for this version
          if ! grep -q "\[$VERSION\]" src/packages/sdk/CHANGELOG.md; then
            echo "::error::SDK CHANGELOG.md missing entry for [$VERSION]"
            echo "Add a ## [$VERSION] section to src/packages/sdk/CHANGELOG.md before releasing."
            exit 1
          fi
          echo "✓ SDK CHANGELOG.md has entry for $VERSION"

          # 4. Root CHANGELOG.md must have an entry for this version
          if ! grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "::error::Root CHANGELOG.md missing entry for [$VERSION]"
            echo "Add a ## [$VERSION] section to CHANGELOG.md before releasing."
            exit 1
          fi
          echo "✓ Root CHANGELOG.md has entry for $VERSION"

          # 5. Python SDK pyproject.toml, _version.py must match tag
          PY_VERSION=$(grep -E '^version\s*=' src/packages/sdk-python/pyproject.toml | sed 's/.*=\s*"\([^"]*\)".*/\1/')
          if [ "$PY_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match Python pyproject.toml ($PY_VERSION)"
            exit 1
          fi
          echo "✓ Python pyproject.toml matches tag: $PY_VERSION"

          echo "All release consistency checks passed for v$VERSION"

      - name: Build SDK
        run: pnpm sdk:build

      - name: Extract changelog snippet
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SNIPPET=$(npx tsx scripts/release-changelog-snippet.ts "$VERSION")
          echo "snippet<<EOF" >> $GITHUB_OUTPUT
          echo "$SNIPPET" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## @evalgate/sdk ${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.snippet }}

            **Install (TypeScript):** `npm install @evalgate/sdk@${{ steps.version.outputs.version }}`
            **Install (Python):** `pip install pauly4010-evalgate-sdk==${{ steps.version.outputs.version }}`
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }} — @evalgate/sdk ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (optional)
        if: env.NPM_TOKEN != ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd src/packages/sdk
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          npm publish --access public --no-git-tag-version
        continue-on-error: true

      - name: Build Python SDK
        run: |
          pip install build
          cd src/packages/sdk-python && python -m build

      - name: Publish to PyPI (optional)
        if: env.PYPI_API_TOKEN != ''
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload src/packages/sdk-python/dist/* --username __token__ --password "$PYPI_API_TOKEN" --non-interactive
        continue-on-error: true
