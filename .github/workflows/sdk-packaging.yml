# SDK packaging — build and pack for distribution (TypeScript + Python)
name: SDK Packaging

on:
  push:
    branches: [main]
    paths:
      - 'src/packages/sdk/**'
      - 'src/packages/sdk-python/**'
      - '.github/workflows/sdk-packaging.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/packages/sdk/**'
      - 'src/packages/sdk-python/**'
      - '.github/workflows/sdk-packaging.yml'
  workflow_dispatch:

jobs:
  sdk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm sdk:build

      - name: Test SDK
        run: pnpm sdk:test --run

      - name: Pack SDK
        run: pnpm pack
        working-directory: src/packages/sdk

      - name: Publish dry-run
        run: npm publish --dry-run
        working-directory: src/packages/sdk

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evalgate-sdk-package
          path: src/packages/sdk/*.tgz

  python-sdk-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/packages/sdk-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]" build

      - name: Test Python SDK
        run: pytest tests/ --tb=short -q

      - name: Build Python SDK
        run: python -m build

      - name: Publish dry-run
        run: pip install twine && twine check dist/*

      - name: Upload Python SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evalgate-sdk-python-package
          path: src/packages/sdk-python/dist/*
