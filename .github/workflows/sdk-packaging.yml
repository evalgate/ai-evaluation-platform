# SDK packaging — build and pack for distribution
name: SDK Packaging

on:
  push:
    branches: [main]
    paths:
      - 'src/packages/sdk/**'
      - '.github/workflows/sdk-packaging.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/packages/sdk/**'
      - '.github/workflows/sdk-packaging.yml'
  workflow_dispatch:

jobs:
  sdk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm sdk:build

      - name: Test SDK
        run: pnpm sdk:test --run

      - name: Pack SDK
        run: pnpm pack
        working-directory: src/packages/sdk

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evalai-sdk-package
          path: src/packages/sdk/*.tgz
