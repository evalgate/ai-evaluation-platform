# Example: EvalAI CI gate using quickstart-ci
# Requires secrets: EVALAI_API_KEY
# Set evaluationId in examples/quickstart-ci/evalgate.config.json or pass --evaluationId
name: Quickstart CI Example

on:
  workflow_dispatch: # Manual trigger for demo

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install quickstart-ci dependencies
        run: npm install
        working-directory: examples/quickstart-ci

      - name: Run evaluation and gate
        env:
          EVALAI_API_KEY: ${{ secrets.EVALAI_API_KEY }}
        run: npm run ci
        working-directory: examples/quickstart-ci
