<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; rx: 8; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #e6edf3; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; fill: #8b949e; }
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; fill: #e6edf3; }
      .pass { fill: #3fb950; }
      .fail { fill: #f85149; }
      .warn { fill: #d29922; }
      .hint { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 12px; fill: #79c0ff; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; fill: #e6edf3; }
      .divider { stroke: #21262d; stroke-width: 1; }
      .header-bg { fill: #161b22; }
    </style>
  </defs>

  <rect class="bg" width="720" height="340" rx="8"/>
  <rect class="border" x="0.5" y="0.5" width="719" height="339"/>

  <rect class="header-bg" x="1" y="1" width="718" height="40" rx="8"/>
  <rect class="header-bg" x="1" y="20" width="718" height="21"/>
  <text class="title" x="20" y="27">EvalGate Regression Gate</text>
  <text class="subtitle" x="620" y="27">Step Summary</text>
  <line class="divider" x1="1" y1="41" x2="719" y2="41"/>

  <text class="mono fail" x="20" y="70">❌  Verdict: FAIL</text>
  <text class="mono" x="20" y="92">Score: 72  (baseline: 90, delta: -18)</text>
  <text class="mono" x="20" y="114">Reason: score 72 &lt; minScore 90</text>

  <line class="divider" x1="20" y1="130" x2="700" y2="130"/>

  <text class="label" x="20" y="152" font-weight="600">Metric</text>
  <text class="label" x="200" y="152" font-weight="600">Baseline</text>
  <text class="label" x="340" y="152" font-weight="600">Current</text>
  <text class="label" x="480" y="152" font-weight="600">Delta</text>
  <text class="label" x="580" y="152" font-weight="600">Status</text>

  <text class="mono" x="20" y="176">Score</text>
  <text class="mono" x="200" y="176">90</text>
  <text class="mono" x="340" y="176">72</text>
  <text class="mono fail" x="480" y="176">-18</text>
  <text class="mono fail" x="580" y="176">❌ FAIL</text>

  <text class="mono" x="20" y="200">Pass rate</text>
  <text class="mono" x="200" y="200">95%</text>
  <text class="mono" x="340" y="200">78%</text>
  <text class="mono fail" x="480" y="200">-17%</text>
  <text class="mono fail" x="580" y="200">❌ FAIL</text>

  <text class="mono" x="20" y="224">Safety</text>
  <text class="mono" x="200" y="224">100%</text>
  <text class="mono" x="340" y="224">100%</text>
  <text class="mono pass" x="480" y="224">0%</text>
  <text class="mono pass" x="580" y="224">✅ PASS</text>

  <line class="divider" x1="20" y1="242" x2="700" y2="242"/>

  <text class="mono" x="20" y="268">📎 Report saved: .evalai/last-report.json</text>

  <text class="hint" x="20" y="296">💡 Next: npx evalai explain</text>
  <text class="subtitle" x="20" y="318">Download the evalai-report artifact to debug locally</text>
</svg>
